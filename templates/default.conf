# nginx reverse proxy configuration for Task Manager app
# this file is mounted into the nginx container at /etc/nginx/templates
# it proxies incoming HTTP requests to the `taskmanager` service on port 3000

server {
    listen 80;
    # server_name can be replaced with $NGINX_HOST if you want to
    # make it dynamic via environment variable and envsubst.
    server_name _;

    location / {
        proxy_pass http://taskmanager:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
