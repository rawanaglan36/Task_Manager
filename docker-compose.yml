version: '3'
services:
    taskmanager:
        build: .
        image: rawan36/taskmanager:latest
        ports:
            - "3000:3000"
        # volumes:
        #     - .:/app
        depends_on:
            mongo:
                condition: service_started
            redis:
                condition: service_started
        environment:
            MONGODB_URI: mongodb://root:example@mongo:27017
            REDIS_URL: redis://redis:6379
        networks:
            - app_network


    mongo:
      image: mongo
      restart: always
      volumes:
        - mongo_data:/data/db
      networks:
        - app_network
      environment:
        MONGO_INITDB_ROOT_USERNAME: root
        MONGO_INITDB_ROOT_PASSWORD: example


    redis:
      image: redis:7-alpine
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data
      restart: unless-stopped
      networks:
        - app_network

    nginx:
      image: nginx
      volumes:
        - ./templates:/etc/nginx/templates
      ports:
        - "8081:80"
      environment:
        - NGINX_HOST=foobar.com
        - NGINX_PORT=80
      networks:
        - app_network

volumes:
    mongo_data:
    redis_data:


networks:
    app_network:
        driver: bridge